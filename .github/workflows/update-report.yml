name: Update Brand Monitor Report

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner pipeline
        run: |
          python scripts/scan.py
          python scripts/dedup.py
          python scripts/score.py
          python scripts/report.py

      - name: Create issue for worthy mentions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/brand-monitor/
        run: python scripts/notify.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html public/index.html
          if [ -f data/mention_log.csv ]; then git add data/mention_log.csv; fi
          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "data: update brand monitor report"
            git push
          fi
